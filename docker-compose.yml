# =============================================================================
# Shared Infrastructure — DigitalOcean (isidora)
# =============================================================================
# Shared services for all deployed projects:
#   - Traefik: Reverse proxy with Let's Encrypt TLS
#   - PostgreSQL: Shared database (create DB per project)
#   - Redis: Shared cache (use DB 0-15 per project)
#   - Langfuse: LLM observability (access via SSH tunnel or Traefik)
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services (NEVER use -v)
#
# Projects connect via the 'infra' Docker network.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Traefik - Reverse Proxy
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=infra
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --accesslog=true
      - --log.level=INFO
      - --ping=true
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - infra
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_AUTH}"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # PostgreSQL - Shared Database
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    environment:
      # These env vars only apply on FIRST initialization (empty data dir).
      # On existing volumes, auth is controlled by the data directory.
      # Values here must match existing credentials for documentation.
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis - Shared Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy noeviction
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - infra
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Langfuse - LLM Observability
  # ---------------------------------------------------------------------------
  # Access: SSH tunnel (ssh -L 3030:localhost:3030 isidora) or via Traefik
  #
  # Setup after first start:
  #   1. Open http://localhost:3030 (via SSH tunnel)
  #   2. Create an account (first user becomes admin)
  #   3. Create a project per app (e.g. "Marie", "Caitie")
  #   4. In each project, go to Settings > API Keys > Create API Key
  #   5. Copy LANGFUSE_PUBLIC_KEY and LANGFUSE_SECRET_KEY to the app's .env
  #   6. Set LANGFUSE_BASE_URL=http://langfuse:3000 in the app's .env
  #      (containers reach Langfuse via Docker network, not the tunnel)
  langfuse:
    image: langfuse/langfuse:2
    container_name: langfuse
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_SECRET}
      - SALT=${LANGFUSE_SALT}
      - NEXTAUTH_URL=${LANGFUSE_URL:-http://localhost:3030}
      - TELEMETRY_ENABLED=false
    ports:
      - "127.0.0.1:3030:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - infra
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  infra:
    name: infra
    driver: bridge

volumes:
  postgres_data:
    name: caitie_postgres_data
  redis_data:
    name: caitie_redis_data
  traefik_letsencrypt:
    name: caitie_traefik_letsencrypt
