# =============================================================================
# Shared Infrastructure — All Environments
# =============================================================================
# One compose for local dev, DigitalOcean, and AWS.
# Differences live in .env — see .env.example.local and .env.example.do.
#
# Usage:
#   docker compose up -d                        # Start (reads .env)
#   docker compose --profile local up -d        # Start with Mailpit (local)
#   docker compose down                         # Stop (NEVER use -v)
#
# Projects connect via the 'infra' Docker network.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Traefik - Reverse Proxy
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.6@sha256:5ae9c349154d5298a5d61a7b25e5f3a9f53314f1515e87632120b95051c7917c
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=${TRAEFIK_INSECURE:-false}
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Trust XFF/CF-Connecting-IP from Cloudflare (origin is behind CF proxy)
      - --entrypoints.websecure.forwardedHeaders.trustedIPs=${TRUSTED_PROXY_IPS:-127.0.0.1/32}
      - --entrypoints.web.forwardedHeaders.trustedIPs=${TRUSTED_PROXY_IPS:-127.0.0.1/32}
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=infra
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      # HTTP-01 resolver (legacy, kept for transition — remove once all certs are DNS-01)
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-noop@localhost}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      # DNS-01 resolver via Cloudflare (primary — works behind CF proxy)
      - --certificatesresolvers.letsencrypt-dns.acme.email=${ACME_EMAIL:-noop@localhost}
      - --certificatesresolvers.letsencrypt-dns.acme.storage=/letsencrypt/acme-dns.json
      - --certificatesresolvers.letsencrypt-dns.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt-dns.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt-dns.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --log.level=INFO
      - --ping=true
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN:-}
    ports:
      - "${HTTP_BIND:-0.0.0.0}:80:80"
      - "${HTTPS_BIND:-0.0.0.0}:443:443"
      - "${TRAEFIK_DASHBOARD_BIND:-127.0.0.1}:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./certs:/etc/traefik/certs:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - infra
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # PostgreSQL - Shared Database
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16@sha256:7d400e340efb42f4d8c9c12c6427adb253f726881a9985d2a471bf0eed824dff
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_BIND:-0.0.0.0}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis - Shared Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: redis
    restart: unless-stopped
    command: redis-server ${REDIS_ARGS:---save 60 1}
    ports:
      - "${REDIS_BIND:-0.0.0.0}:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_HEALTHCHECK_ARGS} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Langfuse v3 - LLM Observability
  # ---------------------------------------------------------------------------
  # v3 splits the v2 single-container design into web + worker, and adds
  # ClickHouse (trace storage), MinIO (event/media blobs). Redis is reused
  # from the shared service above (no auth — LANGFUSE_REDIS_* points at it).
  #
  # Upgrading v2 → v3: use image tag `3.29.0` for the first boot so the
  # Postgres → ClickHouse backfill runs on a version that still knows the
  # v2 schema. After the backfill completes, bump to `:3` (latest).
  # ---------------------------------------------------------------------------
  langfuse-web:
    image: langfuse/langfuse:${LANGFUSE_IMAGE_TAG:-3}
    container_name: langfuse-web
    restart: unless-stopped
    environment:
      # --- Postgres (transactional: users, orgs, projects, prompts, API keys) ---
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/langfuse
      # --- Auth / crypto ---
      - NEXTAUTH_SECRET=${LANGFUSE_SECRET:-local-langfuse-secret-dev-only}
      - NEXTAUTH_URL=${LANGFUSE_URL:-http://localhost:3030}
      - SALT=${LANGFUSE_SALT:-local-langfuse-salt-dev-only}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      - TELEMETRY_ENABLED=false
      # --- Clickhouse (traces, observations, scores) ---
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-clickhouse}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_CLUSTER_ENABLED=false
      # --- Redis (ingestion queue + cache) — shared redis service, no auth ---
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_AUTH=${REDIS_AUTH:-}
      # --- S3 / MinIO (event + media uploads) ---
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=auto
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_PREFIX=events/
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=auto
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_PREFIX=media/
      # --- Local dev seeding (kept from v2 — ignored after first boot) ---
      - LANGFUSE_INIT_ORG_ID
      - LANGFUSE_INIT_ORG_NAME
      - LANGFUSE_INIT_USER_EMAIL
      - LANGFUSE_INIT_USER_NAME
      - LANGFUSE_INIT_USER_PASSWORD
    ports:
      - "${LANGFUSE_BIND:-0.0.0.0}:3030:3000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      infra:
        # Keep resolving the v2 container name `langfuse` so existing projects
        # (Betty, Marie) pointing at http://langfuse:3000 don't need env
        # changes. Drop once all consumers have migrated to `langfuse-web`.
        aliases:
          - langfuse
    labels:
      - "traefik.enable=${LANGFUSE_TRAEFIK:-false}"
      - "traefik.http.routers.langfuse.rule=Host(`langfuse.local`)"
      - "traefik.http.routers.langfuse.entrypoints=websecure"
      - "traefik.http.routers.langfuse.tls=true"
      - "traefik.http.services.langfuse.loadbalancer.server.port=3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  langfuse-worker:
    image: langfuse/langfuse-worker:${LANGFUSE_IMAGE_TAG:-3}
    container_name: langfuse-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/langfuse
      - SALT=${LANGFUSE_SALT:-local-langfuse-salt-dev-only}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      - TELEMETRY_ENABLED=false
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-clickhouse}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_AUTH=${REDIS_AUTH:-}
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=auto
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_PREFIX=events/
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=auto
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_PREFIX=media/
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - infra
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: clickhouse
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    networks:
      - infra
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    entrypoint: sh
    # create the 'langfuse' bucket before starting the service
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_BIND:-127.0.0.1}:9091:9001"
    volumes:
      - minio_data:/data
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Umami - Web Analytics
  # ---------------------------------------------------------------------------
  # Setup after first start:
  #   1. Open http://localhost:3040 (or https://analytics.lostriver.llc on DO)
  #   2. Login with admin / umami (change password immediately)
  #   3. Add a website → copy the tracking script to your app's <head>
  #   4. For custom events (Mac apps), use the POST /api/send endpoint
  umami:
    image: docker.umami.is/umami-software/umami:postgresql-latest@sha256:28f263fe06f79ebffa5a6a6e9bd33b7a278e9342a88e0bdac812416c9f9e4361
    container_name: umami
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/umami
      - APP_SECRET=${UMAMI_SECRET:-local-umami-secret-dev-only}
      - DISABLE_TELEMETRY=1
    ports:
      - "${UMAMI_BIND:-0.0.0.0}:3040:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - infra
    labels:
      - "traefik.enable=${UMAMI_TRAEFIK:-false}"
      - "traefik.http.routers.umami.rule=Host(`${UMAMI_DOMAIN:-analytics.local}`)"
      - "traefik.http.routers.umami.entrypoints=websecure"
      - "traefik.http.routers.umami.tls=${UMAMI_TLS:-true}"
      - "traefik.http.routers.umami.tls.certresolver=${UMAMI_CERTRESOLVER:-}"
      - "traefik.http.services.umami.loadbalancer.server.port=3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Vaultwarden - Password Manager (self-hosted Bitwarden-compatible)
  # ---------------------------------------------------------------------------
  # Data lives in the ${VAULTWARDEN_VOLUME} volume — set explicitly when
  # migrating an existing install so history is preserved.
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    profiles: [vaultwarden]
    environment:
      DOMAIN: "${VAULTWARDEN_DOMAIN:-https://vault.local}"
      SIGNUPS_ALLOWED: "${VAULTWARDEN_SIGNUPS:-false}"
      ADMIN_TOKEN: "${VAULTWARDEN_ADMIN_TOKEN:-}"
    volumes:
      - vaultwarden_data:/data
    networks:
      - infra
    labels:
      - "traefik.enable=${VAULTWARDEN_TRAEFIK:-false}"
      - "traefik.docker.network=infra"
      - "traefik.http.routers.vaultwarden.rule=Host(`${VAULTWARDEN_HOST:-vault.local}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls=${VAULTWARDEN_TLS:-true}"
      - "traefik.http.routers.vaultwarden.tls.certresolver=${VAULTWARDEN_CERTRESOLVER:-}"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Mailpit - Email Catcher (local dev only)
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    profiles: [local]
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - infra
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailpit.rule=Host(`mail.local`)"
      - "traefik.http.routers.mailpit.entrypoints=websecure"
      - "traefik.http.routers.mailpit.tls=true"
      - "traefik.http.services.mailpit.loadbalancer.server.port=8025"

networks:
  infra:
    name: infra
    driver: bridge

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME:-postgres_data}
  redis_data:
    name: ${REDIS_VOLUME:-redis_data}
  traefik_letsencrypt:
    name: ${TRAEFIK_VOLUME:-traefik_letsencrypt}
  vaultwarden_data:
    name: ${VAULTWARDEN_VOLUME:-vaultwarden_data}
  clickhouse_data:
    name: ${CLICKHOUSE_VOLUME:-clickhouse_data}
  clickhouse_logs:
    name: ${CLICKHOUSE_LOGS_VOLUME:-clickhouse_logs}
  minio_data:
    name: ${MINIO_VOLUME:-minio_data}
